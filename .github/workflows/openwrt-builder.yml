name: Flint-2-1000Hz-Final

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: v24.10.6
  CONFIG_FILE: .config
  DIY_P2_SH: diy-part2.sh

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/anthony666/OpenWrt-Build-Actions/master/scripts/depends-ubuntu-2204)
          sudo timedatectl set-timezone "Asia/Shanghai"
          sudo mkdir -p /workdir
          sudo chown $USER:$USER /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Settings & Brute Force Sync
        run: |
          cd openwrt
          # 1. Clear the deck
          rm -f .config
          
          # 2. Identity Lock: Force MediaTek Filogic / Flint 2
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt6000=y" >> .config
          
          # 3. Append your custom selections
          [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cat $GITHUB_WORKSPACE/$CONFIG_FILE >> .config
          
          # 4. Run the 1000Hz Script
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH || true
          
          # 5. THE BRUTE FORCE: Resolve prompts and ignore warnings
          export TERM=xterm
          make defconfig || true
          
          # 6. Final 1000Hz Enforcement
          sed -i '/CONFIG_HZ/d' .config
          echo "CONFIG_HZ_1000=y" >> .config
          echo "CONFIG_HZ=1000" >> .config
          
          # 7. Move straight to kernel prep
          make target/linux/clean || true

      - name: Compile
        run: |
          cd openwrt
          export TERM=xterm
          yes "" | make -j$(nproc) IGNORE_ERRORS=m || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@main
        with:
          name: ImmortalWrt_Flint2_1000Hz
          path: openwrt/bin/targets/mediatek/filogic/*.bin
